name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/devops-virtual-lab/app
            docker build -t devops-lab-app .
            docker save devops-lab-app > devops-lab-app.tar
            sudo /usr/local/bin/k3s ctr images import devops-lab-app.tar
            sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl rollout restart deployment devops-app